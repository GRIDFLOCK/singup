<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Server</title>
    <style>
        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("img/back1.jpg");
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
        }
        .header {
            font-size: 24px;
            color: blue;
            letter-spacing: 1px;
            text-align: center;
            font-weight: bold;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 25px;
            width: 320px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .submit {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: blue;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit:hover {
            background: darkblue;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
        .content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .content label {
            font-weight: bold;
            font-size: 14px;
        }
        .content input {
            padding: 10px;
            border: 1px solid gray;
            border-radius: 10px;
            outline: none;
        }
        .content input:focus {
            border-color: blue;
        }
        .dot-spinner {
            --uib-size: 1.5rem;
            --uib-speed: .9s;
            --uib-color: #183153;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: var(--uib-size);
            width: var(--uib-size);
            display: none;
            }

        .dot-spinner__dot {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            width: 100%;
        }

        .dot-spinner__dot::before {
            content: '';
            height: 20%;
            width: 20%;
            border-radius: 50%;
            background-color: var(--uib-color);
            transform: scale(0);
            opacity: 0.5;
            animation: pulse0112 calc(var(--uib-speed) * 1.111) ease-in-out infinite;
            box-shadow: 0 0 20px rgba(18, 31, 53, 0.3);
            }

        .dot-spinner__dot:nth-child(2) {
            transform: rotate(45deg);
        }

        .dot-spinner__dot:nth-child(2)::before {
            animation-delay: calc(var(--uib-speed) * -0.875);
        }

        .dot-spinner__dot:nth-child(3) {
            transform: rotate(90deg);
        }

        .dot-spinner__dot:nth-child(3)::before {
            animation-delay: calc(var(--uib-speed) * -0.75);
        }

        .dot-spinner__dot:nth-child(4) {
            transform: rotate(135deg);
        }

        .dot-spinner__dot:nth-child(4)::before {
            animation-delay: calc(var(--uib-speed) * -0.625);
        }

        .dot-spinner__dot:nth-child(5) {
            transform: rotate(180deg);
        }

        .dot-spinner__dot:nth-child(5)::before {
            animation-delay: calc(var(--uib-speed) * -0.5);
        }

        .dot-spinner__dot:nth-child(6) {
            transform: rotate(225deg);
        }

        .dot-spinner__dot:nth-child(6)::before {
            animation-delay: calc(var(--uib-speed) * -0.375);
        }

        .dot-spinner__dot:nth-child(7) {
            transform: rotate(270deg);
        }

        .dot-spinner__dot:nth-child(7)::before {
            animation-delay: calc(var(--uib-speed) * -0.25);
        }

        .dot-spinner__dot:nth-child(8) {
            transform: rotate(315deg);
        }

        .dot-spinner__dot:nth-child(8)::before {
            animation-delay: calc(var(--uib-speed) * -0.125);
        }

        @keyframes pulse0112 {
            0%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }

            50% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <p>РЕЄСТРАЦІЯ</p>
        </div>
        <form class="content" id="registerForm">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="введіть email" required>
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="введіть пароль" minlength="6" required>
            <input type="password" id="passwordvalited" name="password" placeholder="введіть пароль" minlength="6" required>
            <p id="err" style="color: red;display: none;"></p>
            <div class="dot-spinner" id="dot-spinner">
                <div class="dot-spinner__dot"></div>
                <div class="dot-spinner__dot"></div>
                <div class="dot-spinner__dot"></div>
                <div class="dot-spinner__dot"></div>
                <div class="dot-spinner__dot"></div>
                <div class="dot-spinner__dot"></div>
                <div class="dot-spinner__dot"></div>
            </div>
            <button class="submit" id="button" type="submit">зареєструватись</button>
        </form>
    </div>
    <script>
        function validateEmail(email) {
             const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
             return emailRegex.test(email);
         }
         function validatePassword(password) {
            const passwordRegex =  /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;
            return passwordRegex.test(password);
         }
          function validatePasswordvalited(passwordvalited) {
            const passwordRegex =  /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;
            return passwordRegex.test(passwordvalited);
          }
       document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const passwordvalited = document.getElementById("passwordvalited").value.trim();
            const err = document.getElementById("err");
            const dotspinner = document.getElementById("dot-spinner");
             
            if (!validatePassword(password)) {
                err.textContent = "Пароль повинен містити принаймні 6 символів, включаючи великі та малі літери, цифри та спеціальні символи.";
                err.style.display = "block";
                return;
            }
            if (!validateEmail(email)) {
                err.textContent = "Невірний формат пошти!";
                err.style.display = "block";
                return;
            }
            if (passwordvalited != password) {
                err.textContent = "паролі не збігаються"
                err.style.display = "block"
                return;
            }
            fetch("https://beckendgrid.onrender.com/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password, passwordvalited})
             })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                  dotspinner.style.display = "block";
                  window.location.href = "login.html";
                  
              } else {
                 document.getElementById("err").textContent = data.message;
                 document.getElementById("err").style.display = "block";
             }
            })

            err.style.display = "none";
            console.log("Дані валідні, можна відправляти на сервер:", { email, password });        
       });
    </script>
</body>
</html>
